[project]
name = "valuemaxx"
version = "0.0.0"
description = "AI Margin Intelligence — Python SDK (init() producer; built in G3)."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "valuemaxx-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/valuemaxx/sdk"]
sources = ["src"]

[tool.uv.sources]
valuemaxx-core = { workspace = true }
