name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync workspace
        run: uv sync --all-packages --all-extras --dev

      - name: Version sync check (manifests match VERSION)
        run: |
          if [ -f sdks/typescript/package.json ]; then
            uv run python scripts/stamp_version.py --check
          else
            echo "TS SDK not scaffolded yet — checking Python SDK only"
          fi
      - name: Release bundle not committed (force-include breaks editable dev)
        run: uv run python scripts/bundle_for_release.py --check
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright (strict)
        run: uv run pyright

      - name: Import-linter contracts
        run: uv run lint-imports

      # H3: regenerate the cross-language fixtures from their Python single-source and fail
      # on drift BEFORE the TS job (the TS SDK consumes these fixtures). The generators live
      # under tests/wire_contract/.
      - name: OTLP semconv parity (regen + diff)
        run: |
          uv run python tests/wire_contract/generate_semconv_fixture.py
          git diff --exit-code tests/wire_contract/semconv_keys.json
      - name: Onboarding rules parity (regen + diff)
        run: |
          uv run python tests/wire_contract/generate_onboarding_rules_fixture.py
          git diff --exit-code tests/wire_contract/onboarding_rules.json \
            sdks/typescript/src/onboarding/onboarding_rules.json
      # The run_id carry contract (T2 baggage key + T3 injected field) the SDKs stamp.
      # Regenerate from valuemaxx.core.wire and diff BOTH the fixture and the TS SDK copy —
      # a drift between the Python source and the TS producer fails the build.
      - name: Run-id wire parity (regen + diff)
        run: |
          uv run python tests/wire_contract/generate_run_id_wire_fixture.py
          git diff --exit-code tests/wire_contract/run_id_wire.json sdks/typescript/src/run_id_wire.json
      # The T2 baggage-encoding golden: the exact `baggage` header string the Python producer
      # emits for the shared vectors. The TS `baggage-parity` test asserts the TS producer
      # emits the identical string, so a drift in EITHER producer's encoding is caught.
      - name: Baggage parity golden (regen + diff)
        run: |
          uv run python tests/wire_contract/generate_baggage_parity_golden.py
          git diff --exit-code tests/wire_contract/baggage_parity_golden.json
      # The golden proposed outcomes.yaml (parsed) from the Python pipeline on the shared
      # fixture repo. The TS `onboard` golden parity test asserts the TS pipeline matches it,
      # so a drift in EITHER pipeline is caught (Python here, TS in the vitest suite).
      - name: Onboarding golden parity (regen + diff)
        run: |
          uv run python tests/wire_contract/generate_onboarding_golden.py
          git diff --exit-code tests/wire_contract/onboarding_golden.json

      - name: llms.txt freshness (matches the registry)
        run: |
          uv run python scripts/generate_llms_txt.py
          git diff --exit-code llms.txt
      - name: Tests + coverage gate (>=90% core)
        run: uv run pytest --cov --cov-report=term-missing --cov-fail-under=90

      - name: Conformance suite (static + behavioral)
        run: uv run pytest tests/conformance -v

  typescript:
    runs-on: ubuntu-latest
    needs: python  # H3: TS consumes the committed semconv fixture validated above
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: |
          if [ -f package.json ]; then npm ci; else echo "TS SDK not scaffolded yet — skipping"; fi
      - name: Typecheck (strict)
        run: if [ -f package.json ]; then npm run typecheck; fi
      - name: Lint
        run: if [ -f package.json ]; then npm run lint; fi
      - name: Test
        run: if [ -f package.json ]; then npm test; fi
