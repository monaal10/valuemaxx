target-version = "py311"
line-length = 100
src = ["packages", "apps", "sdks/python", "tests"]

[lint]
select = [
    "E", "F", "W",      # pyflakes + pycodestyle
    "I",                # isort
    "N",                # pep8-naming
    "UP",               # pyupgrade
    "B",                # bugbear
    "A",                # builtins shadowing
    "ANN",              # flake8-annotations — forbid Any on public signatures (plan §F0-TOOLING)
    "C4",               # comprehensions
    "SIM",              # simplify
    "TID",              # tidy imports
    "PT",               # pytest style
    "RUF",              # ruff-specific
    "ASYNC",            # async pitfalls
    "TRY",              # exception anti-patterns
    "TCH",              # type-checking imports
]
ignore = [
    "TRY003",           # allow long messages in raise
]

# Conformance: tiktoken is BANNED for cost paths (AGENTS.md §5b, design §5.2).
# Enforced repo-wide here; the explicitly-flagged fallback path opts out locally with a noqa+reason.
[lint.flake8-tidy-imports.banned-api]
"tiktoken".msg = "tiktoken undercounts Claude; never use it for cost. See AGENTS.md §5b (no_tiktoken_for_cost)."

# pydantic resolves field annotations at runtime, so imports used only as model
# field types must NOT be hoisted into a TYPE_CHECKING block (that breaks
# validation). Tell ruff that StrictModel/TenantScopedModel/BaseModel subclasses
# are runtime-evaluated so TC001/TC003 don't fight the framework.
[lint.flake8-type-checking]
runtime-evaluated-base-classes = [
    "pydantic.BaseModel",
    "atm_core.base.StrictModel",
    "atm_core.base.TenantScopedModel",
]

[lint.per-file-ignores]
# Tests: asserts are the point; annotating every fixture return adds no safety.
"**/tests/**" = ["S101", "ANN201", "ANN001"]
"tests/**" = ["S101", "ANN201", "ANN001"]

[format]
quote-style = "double"
