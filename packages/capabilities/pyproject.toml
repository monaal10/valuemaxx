[project]
name = "atm-capabilities"
version = "0.0.0"
description = "AI Margin Intelligence — the capability registry contract (single source of truth for operations)."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/atm_capabilities"]
