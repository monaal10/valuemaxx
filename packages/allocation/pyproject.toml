[project]
name = "valuemaxx-allocation"
version = "0.0.0"
description = "AI Margin Intelligence — tiered shared-COGS allocation (direct / shared-proportional / fixed overhead)."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "valuemaxx-core",
    "valuemaxx-capabilities",
    "pyyaml>=6.0",
    # typing_extensions.override is recognised at our 3.11 target (typing.override is 3.12+).
    "typing-extensions>=4.12",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "hypothesis>=6.100",
    "types-PyYAML>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/valuemaxx/allocation"]
sources = ["src"]

[tool.uv.sources]
valuemaxx-core = { workspace = true }
valuemaxx-capabilities = { workspace = true }
