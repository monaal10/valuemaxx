# Alembic config for valuemaxx.store — the migration owner for the whole system.
#
# The database URL is supplied at runtime (env.py reads VALUEMAXX_DB_URL), so no
# credentials live in the repo. ``script_location`` points at the package's
# migrations dir; ``target_metadata`` (set in env.py) is valuemaxx.store.tables.metadata,
# so ``alembic upgrade head`` then ``--autogenerate`` yields an empty diff.

[alembic]
script_location = src/valuemaxx/store/migrations
prepend_sys_path = src
path_separator = os
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
