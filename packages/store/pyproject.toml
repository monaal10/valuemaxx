[project]
name = "valuemaxx-store"
version = "0.0.0"
classifiers = ["Private :: Do Not Upload"]
description = "AI Margin Intelligence — the persistence layer: concrete async SQLAlchemy repositories + the migration owner."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "valuemaxx-core",
    "valuemaxx-capabilities",
    "sqlalchemy[asyncio]>=2,<3",
    "alembic>=1.13",
    "asyncpg>=0.29",
    "aiosqlite>=0.20",
]

[dependency-groups]
dev = [
    "testcontainers[postgres]>=4,<5",
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/valuemaxx/store"]
sources = ["src"]

[tool.uv.sources]
valuemaxx-core = { workspace = true }
valuemaxx-capabilities = { workspace = true }
