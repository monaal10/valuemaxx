[project]
name = "valuemaxx-attribution"
version = "0.0.0"
classifiers = ["Private :: Do Not Upload"]
description = "AI Margin Intelligence — attribution logic package (skeleton; built in G2)."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "valuemaxx-core",
    "valuemaxx-capabilities",
    # ``typing_extensions.override`` is recognised by the type checker at our
    # 3.11 target (``typing.override`` is 3.12+); used to mark cascade resolver
    # overrides so ``reportImplicitOverride`` stays satisfied.
    "typing-extensions>=4.12",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/valuemaxx/attribution"]
sources = ["src"]

[tool.uv.sources]
valuemaxx-core = { workspace = true }
valuemaxx-capabilities = { workspace = true }
